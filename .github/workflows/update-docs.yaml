name: Update Docs

on:
  push:
    branches: ["dev"]

jobs:
  update-docs:
    name: Update Directory Tree
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Gerar Árvore de Diretórios
        run: |
          npx --yes --quiet tree-cli@latest -a -d -l 3 --ignore "node_modules, .git, dist, coverage, build, .turbo" > tree.txt

      - name: Injetar Árvore no Markdown
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const rawTree = fs.readFileSync('tree.txt', 'utf8');

            // Filtra o texto cru e mantém estritamente as linhas que contêm os caracteres do desenho da árvore
            const cleanTreeLines = rawTree
              .split('\n')
              .filter(line => line.includes('├') || line.includes('└') || line.includes('│') || line.includes('|') || line.includes('─'));

            // Adiciona um ponto '.' no topo para representar a raiz do projeto de forma limpa e profissional
            const finalTree = ".\n" + cleanTreeLines.join('\n');

            const startTag = '<!-- START_TREE -->';
            const endTag = '<!-- END_TREE -->';

            // Regex segura para multiline que busca o conteúdo entre as tags
            const regex = new RegExp(`${startTag}[\\s\\S]*?${endTag}`, 'g');

            // Monta o novo bloco (mantendo as tags)
            const newContent = `${startTag}\n\`\`\`text\n${finalTree}\n\`\`\`\n${endTag}`;

            // Busca recursivamente arquivos .md do projeto:
            function getAllMarkdownFiles(dir, fileList = []) {
              const files = fs.readdirSync(dir);

              for (const file of files) {
                const filePath = path.join(dir, file);

                if (fs.statSync(filePath).isDirectory()) {
                  // Otimização: Evita entrar em pastas de infraestrutura/build
                  if (!['node_modules', '.git', 'dist', 'build', 'coverage', '.turbo'].includes(file)) {
                    getAllMarkdownFiles(filePath, fileList);
                  }
                } else if (filePath.endsWith('.md')) {
                  fileList.push(filePath);
                }
              }
              return fileList;
            }

            const mdFiles = getAllMarkdownFiles('.');
            let updatedCount = 0;

            // Processamento idempotente dos arquivos .md:
            for (const file of mdFiles) {
              try {
                let content = fs.readFileSync(file, 'utf8');

                // Só gasta processamento e I/O se o arquivo possuir as âncoras:
                if (content.includes(startTag) && content.includes(endTag)) {
                  content = content.replace(regex, newContent);
                  fs.writeFileSync(file, content);
                  console.log(`✅ Árvore injetada com sucesso em: ${file}`);
                  updatedCount++;
                }
              } catch (error) {
                console.error(`❌ Erro ao tentar processar o arquivo ${file}:`, error);
                // Não usamos process.exit(1) aqui para que um arquivo com problema de permissão não quebre a atualização dos outros.
              }
            }

            console.log(`\nResumo: ${updatedCount} arquivo(s) atualizado(s).`);

            // Limpeza do artefato temporário
            fs.unlinkSync('tree.txt');

      - name: Criar Pull Request Automático
        if: ${{ !env.ACT }}
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: atualiza árvore de diretórios"
          branch: chore/update-docs-tree
          delete-branch: true
          title: "docs: Atualização Automática da Árvore de Diretórios"
          body: |
            # 🤖 **Atualização Automática**:

            Este PR foi gerado automaticamente pelo pipeline de CI/CD.
            Foram detectadas mudanças na estrutura do diretório `src/` e todos os arquivos `*.md` foram atualizados para refletir a nova arquitetura.
          labels: documentation, automated pr
