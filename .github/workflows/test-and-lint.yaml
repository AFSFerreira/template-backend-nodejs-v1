name: Lint and Build

on:
  push:
    branches: ['dev', 'main']
  pull_request:
    branches: '**'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: 'npm'
      
      # - name: Cache npm
      #   id: npm-cache-dir
      #   shell: bash
      #   run: echo "dir=$(npm config get cache)" >> ${GITHUB_ENV}

      - name: Install Dependencies
        run: npm ci
      
      - name: Run Formatter
        run: npm run format

      - name: Run Linter
        run: npm run lint:fix

      - name: Build
        run:
          npm run build
