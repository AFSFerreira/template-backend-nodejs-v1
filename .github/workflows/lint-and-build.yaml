name: Lint and Build

on:
  push:
    branches: ['dev']
  pull_request:
    branches: '**'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Run Linter
        run: |
          npm run ci:lint && \
          echo "✅ Lint passed" >> $GITHUB_STEP_SUMMARY || \
          echo "❌ Lint failed" >> $GITHUB_STEP_SUMMARY

      - name: Run Formatter
        run: |
          npm run ci:format && \
          echo "✅ Format check passed" >> $GITHUB_STEP_SUMMARY || \
          echo "❌ Format check failed" >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: |
          npm run ci:build && \
          echo "✅ Build succeeded" >> $GITHUB_STEP_SUMMARY || \
          echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY

      - name: Final Summary
        if: ${{ always() }}
        run: |
          echo "## 🧾 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "Node.js v${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Completed at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -d dist ]; then ls -lh dist/ | tail -n +2 >> $GITHUB_STEP_SUMMARY; else echo "No dist/ folder found" >> $GITHUB_STEP_SUMMARY; fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

